<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <section class="hero">
            <h1>Welcome to Our Sushi Site</h1>
            <p>Fresh and delicious sushi delivered to your door.</p>
            <a href="#products" class="btn">Shop Now</a>
        </section>
    </header>
    <main>
        <section id="products">
            <h2>Our Products</h2>
            <div class="products-grid">
                <div class="product">
                    <img src="sushi1.jpg" alt="Sushi 1">
                    <h3>Sushi Roll 1</h3>
                    <p>$10.00</p>
                </div>
                <div class="product">
                    <img src="sushi2.jpg" alt="Sushi 2">
                    <h3>Sushi Roll 2</h3>
                    <p>$12.00</p>
                </div>
                <div class="product">
                    <img src="sushi3.jpg" alt="Sushi 3">
                    <h3>Sushi Roll 3</h3>
                    <p>$15.00</p>
                </div>
                <div class="product">
                    <img src="sushi4.jpg" alt="Sushi 4">
                    <h3>Sushi Roll 4</h3>
                    <p>$11.00</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Sushi Site. All rights reserved.</p>
    </footer>
</body>
</html>
